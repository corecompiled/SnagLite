name: .NET CLI build

on:
  push:
    branches: [main]
    paths:
      - 'src/**'
      - 'SnagLite.slnx'
      - '.github/workflows/dotnet-cli.yml'
  pull_request:
    paths:
      - 'src/**'
      - 'SnagLite.slnx'
      - '.github/workflows/dotnet-cli.yml'
  workflow_dispatch:

jobs:
  build:
    name: Publish win-x64 single-file
    runs-on: windows-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up .NET SDK
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: '10.0.x'

      - name: Restore
        run: dotnet restore src/SnagLite/SnagLite.csproj

      - name: Publish
        run: dotnet publish src/SnagLite/SnagLite.csproj -c Release -r win-x64 --self-contained -o publish --no-restore

      - name: Upload snaglite.exe
        uses: actions/upload-artifact@v4
        with:
          name: snaglite-win-x64
          path: publish/snaglite.exe
          if-no-files-found: error
